<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paradise Nursery</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f5f7f2; color: #16351f; }
    .background-image { background-image: url('https://images.unsplash.com/photo-1463320726281-696a485928c7?auto=format&fit=crop&w=1600&q=80'); background-size: cover; background-position: center; background-repeat: no-repeat; }
    .landing-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .landing-overlay { width: min(900px, 95%); padding: 3rem; background: rgba(255,255,255,.88); border-radius: 24px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .landing-overlay h1 { margin: 0 0 1rem; font-size: clamp(2.2rem, 5vw, 4.5rem); color: #1f6b33; }
    .about-us-container { max-width: 760px; margin: 0 auto 2rem; line-height: 1.7; font-size: 1.08rem; }
    .about-us-container h2 { color: #2f7d32; }
    button, .continue-shopping-button { border: none; border-radius: 10px; cursor: pointer; font-weight: 700; text-decoration: none; }
    .get-started-button { padding: 1rem 2.2rem; background: #2f7d32; color: #fff; font-size: 1.1rem; }
    .navbar { position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #174d28; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .logo, .nav-links a { color: #fff; text-decoration: none; font-weight: 700; cursor: pointer; }
    .logo { font-size: 1.35rem; }
    .nav-links { display: flex; gap: 1.2rem; align-items: center; }
    .cart-link { font-size: 1.3rem; }
    .cart-count { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 24px; padding: 0 6px; margin-left: 4px; border-radius: 999px; background: #ffcc33; color: #174d28; font-size: .85rem; }
    .product-page, .cart-page { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .product-page h1, .cart-page h1 { text-align: center; color: #174d28; }
    .category-section { margin: 2.5rem 0; }
    .category-section h2 { padding-bottom: .5rem; border-bottom: 3px solid #2f7d32; color: #2f7d32; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }
    .plant-card { background: #fff; border-radius: 18px; padding: 1rem; text-align: center; box-shadow: 0 12px 28px rgba(0,0,0,.1); }
    .plant-thumbnail { width: 100%; height: 180px; object-fit: cover; border-radius: 14px; }
    .price { color: #1f6b33; font-weight: 700; font-size: 1.1rem; }
    .add-to-cart-button { width: 100%; padding: .8rem 1rem; background: #2f7d32; color: #fff; }
    .add-to-cart-button:disabled { background: #888; cursor: not-allowed; opacity: .8; }
    .cart-summary { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; padding: 1rem 1.5rem; background: #e3f1e5; border-radius: 14px; }
    .empty-cart { text-align: center; font-size: 1.25rem; }
    .cart-items { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
    .cart-item { display: grid; grid-template-columns: 110px 1fr auto auto; gap: 1rem; align-items: center; padding: 1rem; background: #fff; border-radius: 16px; box-shadow: 0 10px 24px rgba(0,0,0,.09); }
    .cart-thumbnail { width: 110px; height: 90px; object-fit: cover; border-radius: 12px; }
    .quantity-controls { display: flex; align-items: center; gap: .7rem; }
    .quantity-controls button { width: 34px; height: 34px; background: #2f7d32; color: #fff; font-size: 1.1rem; }
    .delete-button { padding: .7rem 1rem; background: #c62828; color: #fff; }
    .cart-actions { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; }
    .continue-shopping-button, .checkout-button { display: inline-block; padding: .9rem 1.4rem; font-size: 1rem; }
    .continue-shopping-button { background: #174d28; color: #fff; }
    .checkout-button { background: #ffcc33; color: #174d28; }
    @media (max-width: 700px) { .navbar, .cart-summary { flex-direction: column; } .cart-item { grid-template-columns: 1fr; text-align: center; } .cart-thumbnail { width: 100%; height: 180px; } .quantity-controls { justify-content: center; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const categories = [
      { category: 'Aromatic Plants', plants: [
        { id: 1, name: 'Lavender', price: 12, image: 'https://images.unsplash.com/photo-1528756514091-dee5ecaa3278?auto=format&fit=crop&w=500&q=80' },
        { id: 2, name: 'Rosemary', price: 10, image: 'https://images.unsplash.com/photo-1620920185964-203c32b57de0?auto=format&fit=crop&w=500&q=80' },
        { id: 3, name: 'Mint', price: 8, image: 'https://images.unsplash.com/photo-1628557044797-f21a177c37ec?auto=format&fit=crop&w=500&q=80' },
        { id: 4, name: 'Basil', price: 9, image: 'https://images.unsplash.com/photo-1618375569909-3c8616cf7733?auto=format&fit=crop&w=500&q=80' },
        { id: 5, name: 'Lemon Balm', price: 11, image: 'https://images.unsplash.com/photo-1599685315640-f54731f3999f?auto=format&fit=crop&w=500&q=80' },
        { id: 6, name: 'Thyme', price: 7, image: 'https://images.unsplash.com/photo-1515586000433-45406d8e6662?auto=format&fit=crop&w=500&q=80' }
      ]},
      { category: 'Air Purifying Plants', plants: [
        { id: 7, name: 'Snake Plant', price: 18, image: 'https://images.unsplash.com/photo-1593482892290-f54927ae2b2f?auto=format&fit=crop&w=500&q=80' },
        { id: 8, name: 'Peace Lily', price: 20, image: 'https://images.unsplash.com/photo-1598880940080-ff9a29891b85?auto=format&fit=crop&w=500&q=80' },
        { id: 9, name: 'Spider Plant', price: 15, image: 'https://images.unsplash.com/photo-1520412099551-62b6bafeb5bb?auto=format&fit=crop&w=500&q=80' },
        { id: 10, name: 'Boston Fern', price: 16, image: 'https://images.unsplash.com/photo-1552555186-80d2afcd4f10?auto=format&fit=crop&w=500&q=80' },
        { id: 11, name: 'Aloe Vera', price: 14, image: 'https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=500&q=80' },
        { id: 12, name: 'Rubber Plant', price: 22, image: 'https://images.unsplash.com/photo-1545239705-1564e58b9e4a?auto=format&fit=crop&w=500&q=80' }
      ]},
      { category: 'Low Maintenance Plants', plants: [
        { id: 13, name: 'ZZ Plant', price: 21, image: 'https://images.unsplash.com/photo-1632207691143-643e2a9a9361?auto=format&fit=crop&w=500&q=80' },
        { id: 14, name: 'Pothos', price: 13, image: 'https://images.unsplash.com/photo-1597305877032-0668b3c6413a?auto=format&fit=crop&w=500&q=80' },
        { id: 15, name: 'Jade Plant', price: 17, image: 'https://images.unsplash.com/photo-1459411621453-7b03977f4bfc?auto=format&fit=crop&w=500&q=80' },
        { id: 16, name: 'Cactus', price: 12, image: 'https://images.unsplash.com/photo-1509587584298-0f3b3a3a1797?auto=format&fit=crop&w=500&q=80' },
        { id: 17, name: 'Succulent Mix', price: 19, image: 'https://images.unsplash.com/photo-1485955900006-10f4d324d411?auto=format&fit=crop&w=500&q=80' },
        { id: 18, name: 'Monstera', price: 25, image: 'https://images.unsplash.com/photo-1614594975525-e45190c55d0b?auto=format&fit=crop&w=500&q=80' }
      ]}
    ];

    let cart = JSON.parse(localStorage.getItem('paradiseCart') || '[]');
    let page = location.hash.replace('#', '') || 'home';

    function saveCart() { localStorage.setItem('paradiseCart', JSON.stringify(cart)); }
    function totalQty() { return cart.reduce((sum, item) => sum + item.quantity, 0); }
    function totalAmount() { return cart.reduce((sum, item) => sum + item.quantity * item.price, 0); }
    function go(target) { page = target; location.hash = target; render(); }

    function navbar() {
      return `<nav class="navbar"><a class="logo" onclick="go('home')">Paradise Nursery</a><div class="nav-links"><a onclick="go('home')">Home</a><a onclick="go('products')">Plants</a><a class="cart-link" onclick="go('cart')">🛒 <span class="cart-count">${totalQty()}</span></a></div></nav>`;
    }

    function renderHome() {
      return `<div class="landing-page background-image"><div class="landing-overlay"><h1>Welcome to Paradise Nursery</h1><div class="about-us-container"><h2>About Paradise Nursery</h2><p>Paradise Nursery is a trusted online houseplant shop dedicated to helping customers create beautiful, healthy, and refreshing indoor spaces.</p><p>Our mission is to make plant ownership simple and enjoyable by offering carefully selected houseplants, clear plant information, and affordable prices for every home and office.</p><p>We provide aromatic plants, air-purifying plants, and low-maintenance plants for new and experienced plant lovers.</p></div><button class="get-started-button" onclick="go('products')">Get Started</button></div></div>`;
    }

    function addToCart(id) {
      const plant = categories.flatMap(c => c.plants).find(p => p.id === id);
      if (!cart.some(item => item.id === id)) cart.push({ ...plant, quantity: 1 });
      saveCart(); render();
    }

    function renderProducts() {
      return navbar() + `<main class="product-page"><h1>Paradise Nursery Plant Collection</h1>${categories.map(group => `<section class="category-section"><h2>${group.category}</h2><div class="product-grid">${group.plants.map(plant => { const inCart = cart.some(item => item.id === plant.id); return `<div class="plant-card"><img class="plant-thumbnail" src="${plant.image}" alt="${plant.name}"><h3>${plant.name}</h3><p class="price">$${plant.price}</p><button class="add-to-cart-button" onclick="addToCart(${plant.id})" ${inCart ? 'disabled' : ''}>${inCart ? 'Added to Cart' : 'Add to Cart'}</button></div>`; }).join('')}</div></section>`).join('')}</main>`;
    }

    function updateQty(id, quantity) {
      cart = quantity <= 0 ? cart.filter(item => item.id !== id) : cart.map(item => item.id === id ? { ...item, quantity } : item);
      saveCart(); render();
    }
    function removeItem(id) { cart = cart.filter(item => item.id !== id); saveCart(); render(); }

    function renderCart() {
      return navbar() + `<main class="cart-page"><h1>Shopping Cart</h1><div class="cart-summary"><h2>Total number of plants: ${totalQty()}</h2><h2>Total cart amount: $${totalAmount().toFixed(2)}</h2></div>${cart.length === 0 ? '<p class="empty-cart">Your cart is empty.</p>' : `<div class="cart-items">${cart.map(item => `<div class="cart-item"><img class="cart-thumbnail" src="${item.image}" alt="${item.name}"><div><h3>${item.name}</h3><p>Unit price: $${item.price}</p><p>Total cost for this plant: $${(item.price * item.quantity).toFixed(2)}</p></div><div class="quantity-controls"><button onclick="updateQty(${item.id}, ${item.quantity - 1})">-</button><span>${item.quantity}</span><button onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button></div><button class="delete-button" onclick="removeItem(${item.id})">Delete</button></div>`).join('')}</div>`}<div class="cart-actions"><a class="continue-shopping-button" onclick="go('products')">Continue Shopping</a><button class="checkout-button" onclick="alert('Coming Soon')">Checkout</button></div></main>`;
    }

    function render() {
      if (page === 'products') document.getElementById('app').innerHTML = renderProducts();
      else if (page === 'cart') document.getElementById('app').innerHTML = renderCart();
      else document.getElementById('app').innerHTML = renderHome();
    }

    window.addEventListener('hashchange', () => { page = location.hash.replace('#', '') || 'home'; render(); });
    render();
  </script>
</body>
</html>
